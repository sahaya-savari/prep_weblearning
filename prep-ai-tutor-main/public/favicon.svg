<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Brain outline paths -->
  <!-- Left hemisphere -->
  <path d="M20 38 C14 36 12 30 14 25 C16 19 22 17 26 20 C27 15 33 13 37 17"
        stroke="url(#glow)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right hemisphere -->
  <path d="M37 17 C42 14 48 18 48 24 C51 26 52 32 49 36 C47 40 42 41 38 39"
        stroke="url(#glow)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Bottom curve connecting hemispheres -->
  <path d="M20 38 C22 44 28 46 32 44 C36 46 42 44 38 39"
        stroke="url(#glow)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Center divider -->
  <line x1="32" y1="20" x2="32" y2="44" stroke="url(#glow)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Neural nodes -->
  <circle cx="22" cy="28" r="2" fill="#22d3ee" opacity="0.9"/>
  <circle cx="42" cy="28" r="2" fill="#818cf8" opacity="0.9"/>
  <circle cx="32" cy="23" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="28" cy="36" r="1.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="36" cy="36" r="1.5" fill="#22d3ee" opacity="0.7"/>

  <!-- Sparkle top-right -->
  <circle cx="53" cy="11" r="2.5" fill="#22d3ee" opacity="0.85"/>
  <circle cx="59" cy="18" r="1.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="47" cy="7"  r="1.5" fill="#818cf8" opacity="0.6"/>
</svg>
